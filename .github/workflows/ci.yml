# GitHub Actions CI. Shell helpers live under `.github/workflows/pipeline_tests/`
# and `.github/workflows/pipeline_utils/` (see also `.github/workflows/ci/*.yml` job fragments).
name: CI

on:
  push:
    branches: [main, master, dev]
  pull_request:
    branches: [main, master, dev]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
