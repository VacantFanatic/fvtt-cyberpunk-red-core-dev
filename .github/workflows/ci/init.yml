# Initialize CI for the project (legacy job definition format; scripts are under
# `.github/workflows/pipeline_*`).
#
# Configures environment variables and installs npm dependencies used in other jobs.
init:
  stage: init
  before_script:
    - apt-get update
    - apt-get install -y curl jq
  script:
    - ./.github/workflows/pipeline_tests/test-choombot-key.sh
    - ./.github/workflows/pipeline_tests/test-envar-exports.sh
    - ./.github/workflows/pipeline_utils/envars.sh
    - npm ci
  artifacts:
    expire_in: 1h
    reports:
      dotenv: vars.env
  rules:
    # Don't run if we're in the cleanup-dev schedule
    - if: $CPR_SCHEDULE == "cleanup-dev"
    # Run on MRs
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    # Run on merge to 'dev'
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    # Run on git tag
    - if: $CI_COMMIT_TAG
