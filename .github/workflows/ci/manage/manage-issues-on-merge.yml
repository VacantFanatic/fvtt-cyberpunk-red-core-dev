# Manages issues when we merge into `dev`
#
# Automates updating any Issues when merging a pull request:
#   * Adds a text reply that a PR has been merged into `dev`
#   * Adds Labels
#   * Closes Issue
#
# NOTE: This will run on all pushes to `dev` (including manual ones),
# however there is logic in the script to ensure it only runs if it's
# related to a merge request. (Legacy GitLab CI lacked reliable MR env vars on push.)

manage-issues-on-merge:
  stage: init
  image: mvdan/shfmt:latest-alpine
  before_script:
    - apk update
    - apk add bash jq curl
  script:
    - ./.github/workflows/pipeline_utils/manage-issues-on-merge.sh
  needs:
    - job: init
      artifacts: true
  rules:
    # Don't run if we're in the cleanup-dev schedule
    - if: $CPR_SCHEDULE == "cleanup-dev"
      when: never
    - if: $CI_PIPELINE_SOURCE == "push" && $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
