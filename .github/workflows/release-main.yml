# Build and publish a GitHub Release when `package.json` changes on the integration branch.
# Tag format: v{package.json version}-{run_number} so repeated runs stay unique.

name: Release (main / master)

on:
  push:
    branches: [main, master]
    paths:
      - "package.json"

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Read package version
        id: pkg
        run: echo "version=$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Install dependencies
        run: npm ci

      - name: Build
        env:
          CI: true
          SYSTEM_VERSION: v${{ steps.pkg.outputs.version }}
        run: npm run build

      - name: Package manifest and zip
        env:
          SYSTEM_VERSION: v${{ steps.pkg.outputs.version }}
        run: |
          cp dist/system.json system.json
          mv dist "fvtt-cyberpunk-red-core-${SYSTEM_VERSION}"
          zip -qr "fvtt-cyberpunk-red-core-${SYSTEM_VERSION}.zip" "fvtt-cyberpunk-red-core-${SYSTEM_VERSION}"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.pkg.outputs.version }}-${{ github.run_number }}
          name: v${{ steps.pkg.outputs.version }} (build ${{ github.run_number }})
          body: |
            Automated build from commit [`${{ github.sha }}`](${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}) on branch `${{ github.ref_name }}`.

            **Artifacts**
            - `system.json` — manifest (same as inside the zip)
            - `fvtt-cyberpunk-red-core-v${{ steps.pkg.outputs.version }}.zip` — installable system folder for Foundry VTT

            Manifest URL for Foundry (uses **latest** after publish):
            `https://github.com/${{ github.repository }}/releases/latest/download/system.json`
          files: |
            system.json
            fvtt-cyberpunk-red-core-v${{ steps.pkg.outputs.version }}.zip
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
