# Build and create a draft GitHub Release on every push to main/master.
# Tag format: v{package.json version}. Publish the draft in GitHub when ready.
# Drafts are not the "latest" release until published.

name: Release (main / master)

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main, master]

permissions:
  contents: write

concurrency:
  group: release-${{ github.event.workflow_run.head_branch }}
  cancel-in-progress: true

jobs:
  release:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Read package version
        id: pkg
        run: echo "version=$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Install dependencies
        run: npm ci

      - name: Verify manifest and package versions stay in sync
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          SYS_VERSION=$(node -p "require('./src/system.json').version")
          if [ "$PKG_VERSION" != "$SYS_VERSION" ]; then
            echo "Version mismatch: package.json=$PKG_VERSION, src/system.json=$SYS_VERSION"
            exit 1
          fi

      - name: Build
        env:
          CI: true
        run: npm run build

      - name: Package manifest and zip
        env:
          SYSTEM_VERSION: v${{ steps.pkg.outputs.version }}
        run: |
          cp dist/system.json system.json
          mv dist "fvtt-cyberpunk-red-core-${SYSTEM_VERSION}"
          zip -qr "fvtt-cyberpunk-red-core-${SYSTEM_VERSION}.zip" "fvtt-cyberpunk-red-core-${SYSTEM_VERSION}"

      - name: Create draft GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          tag_name: v${{ steps.pkg.outputs.version }}
          name: v${{ steps.pkg.outputs.version }}
          body: |
            **Draft** — publish this release on GitHub when you are ready for it to go live.

            Built from commit [`${{ github.event.workflow_run.head_sha }}`](${{ github.server_url }}/${{ github.repository }}/commit/${{ github.event.workflow_run.head_sha }}) on branch `${{ github.event.workflow_run.head_branch }}`.

            **Artifacts**
            - `system.json` — manifest (same as inside the zip)
            - `fvtt-cyberpunk-red-core-v${{ steps.pkg.outputs.version }}.zip` — installable system folder for Foundry VTT

            After you **publish** this release, the manifest URL for Foundry can use:
            `https://github.com/${{ github.repository }}/releases/latest/download/system.json`
          files: |
            system.json
            fvtt-cyberpunk-red-core-v${{ steps.pkg.outputs.version }}.zip
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
