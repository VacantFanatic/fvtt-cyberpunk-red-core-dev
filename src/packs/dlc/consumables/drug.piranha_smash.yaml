  consumed: Piranha Smash Primary
  description:
    value: |-
      <p>
       Looks like smash but it's smash with a lime flavor. And a lower risk of
       addiction.
      </p>
      <p><strong>Primary Effect</strong></p>
      <p>Dose lasts 4 hours.</p>
      <p>
       The user feels happy and satisfied, receiving a temporary modifier of +2 to
       the following skills
      </p>
      <ul>
       <li>Acting</li>
       <li>Dance</li>
       <li>Contortionist</li>
       <li>Conversation</li>
       <li>Human Perception</li>
       <li>Persuasion</li>
      </ul>
      <p><strong>Secondary Effect (DV9)</strong></p>
      <p>
       When the dose wears off, the user rolls
       <strong>WILL + Resist Torture/Drugs + 1d10 against Secondary DV</strong>.
      </p>
      <p>If this fails, they take a -2 to the following skills</p>
      <ul>
       <li>Acting</li>
       <li>Dance</li>
       <li>Contortionist</li>
       <li>Conversation</li>
       <li>Human Perception</li>
       <li>Persuasion</li>
      </ul>
